# Extreme: mirroring applied every sample (p=1.0).
# Since mirroring is an isometry, deterioration is not expected — this config
# tests whether the model is robust to always-inverted spatial arrangements,
# and provides a useful control showing which augmentations are truly harmful.

gaussian_noise:
  p: 0.0
  sigma: 0.01
  delta_p: 1.0

rotation_scaling:
  p: 0.0
  angle: 15.0
  scale_range: [0.9, 1.1]

simulated_low_res:
  p: 0.0
  factor_range: [1, 2]

mirroring:
  p: 1.0

gaussian_blur:
  p: 0.0
  kernel_size: 5
  sigma: 1.0
