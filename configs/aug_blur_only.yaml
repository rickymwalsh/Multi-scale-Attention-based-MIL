# Ablation: gaussian blur only (all other augmentations disabled).
# Parameters match the current data_augmentation.yaml baseline.

gaussian_noise:
  p: 0.0
  sigma: 0.01
  delta_p: 1.0

rotation_scaling:
  p: 0.0
  angle: 15.0
  scale_range: [0.9, 1.1]

simulated_low_res:
  p: 0.0
  factor_range: [1, 2]

mirroring:
  p: 0.0

gaussian_blur:
  p: 0.75
  kernel_size: 5
  sigma: 
    type: uniform
    low: 0.5
    high: 1.5
