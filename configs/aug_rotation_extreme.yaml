# Extreme: rotation & scaling only with highly distorted scale range [0.1, 10.0].
# Applied every sample (p=1.0); scale factor 0.1-10x destroys consistent feature norms,
# expected to cause deterioration.

gaussian_noise:
  p: 0.0
  sigma: 0.01
  delta_p: 1.0

rotation_scaling:
  p: 1.0
  scale_range: [0.1, 10.0]

simulated_low_res:
  p: 0.0
  factor_range: [1, 2]

mirroring:
  p: 0.0

gaussian_blur:
  p: 0.0
  kernel_size: 5
  sigma: 1.0
