# Extreme: rotation & scaling only with large angle range [-45, 45] degrees and
# highly distorted scale range [0.1, 10.0]. Applied every sample (p=1.0).
# Expected to cause deterioration due to severe spatial distortion and scale changes.

gaussian_noise:
  p: 0.0
  sigma: 0.01
  delta_p: 1.0

rotation_scaling:
  p: 1.0
  angle:
    type: uniform
    low: -60.0
    high: 60.0
  scale_range: [0.2, 5]

simulated_low_res:
  p: 0.0
  factor_range: [1, 2]

mirroring:
  p: 0.0

gaussian_blur:
  p: 0.0
  kernel_size: 5
  sigma: 1.0
