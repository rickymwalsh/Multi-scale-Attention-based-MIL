# Extreme: gaussian blur only with kernel_size=31, sigma=10.0, applied every sample.
# Averages features across a large spatial neighbourhood, effectively
# destroying local patch specificity; expected to cause deterioration.

gaussian_noise:
  p: 0.0
  sigma: 0.01
  delta_p: 1.0

rotation_scaling:
  p: 0.0
  angle: 15.0
  scale_range: [0.9, 1.1]

simulated_low_res:
  p: 0.0
  factor_range: [1, 2]

mirroring:
  p: 0.0

gaussian_blur:
  p: 1.0
  kernel_size: 31
  sigma: 10.0
